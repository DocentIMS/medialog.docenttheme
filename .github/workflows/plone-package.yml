# Plone 6 theme — buildout-based CI
name: Plone package

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]

    workflow_dispatch:


jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.10', '3.11']

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - uses: actions/cache@v4
              with:
                  path: |
                    ~/.cache/pip
                    ~/buildout-cache
                  key: ${{ runner.os }}-buildout-${{ matrix.python-version }}-${{ hashFiles('test_plone60.cfg', 'base.cfg', 'requirements.txt', 'constraints_plone60.txt') }}
                  restore-keys: |
                    ${{ runner.os }}-buildout-${{ matrix.python-version }}-

            - name: Setup buildout cache
              run: |
                  mkdir -p ~/buildout-cache/{eggs,downloads}
                  mkdir -p ~/.buildout
                  echo "[buildout]" > $HOME/.buildout/default.cfg
                  echo "download-cache = $HOME/buildout-cache/downloads" >> $HOME/.buildout/default.cfg
                  echo "eggs-directory = $HOME/buildout-cache/eggs" >> $HOME/.buildout/default.cfg

            - name: Install buildout
              run: pip install "zc.buildout==4.1.4"

            - name: Run buildout
              run: buildout -c test_plone60.cfg

            - name: Run tests
              run: bin/test
