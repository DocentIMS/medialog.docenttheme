[buildout]

extends =
    https://raw.githubusercontent.com/collective/buildout.plonetest/master/test-6.0.x.cfg
    https://raw.githubusercontent.com/collective/buildout.plonetest/master/qa.cfg
    base.cfg

update-versions-file = test_plone60.cfg

[test]
eggs +=
    z3c.jbot

[versions]
createcoverage = 1.5
watchdog = 2.1.6
# z3c.jbot is unpinned in the Plone 6.0 KGS, so buildout would pick the
# latest release (3.x). z3c.jbot >= 2.2 ships as a PEP 420 native namespace
# (it dropped `namespace_packages`/the `z3c/__init__.py` stub), which
# collides with the pkg_resources-declared `z3c` namespace used by Plone's
# other z3c.* eggs under zc.recipe.testrunner. The result is
# "ImportError: Module z3c has no global jbot" when ZCML loads
# z3c.jbot:meta.zcml. 2.1 is the last release that still declares the
# old-style `z3c` namespace, so it rejoins the shared namespace.
z3c.jbot = 2.1
